name: Daily Bluesky Post Email

# This workflow uses the public Bluesky API (no authentication required)
# Uses bluesky_daily_post.py to fetch posts and send emails

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC (6 AM Brazil time)
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  send-daily-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Debug - List files
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la
          echo "Python files:"
          ls -la *.py || echo "No Python files found"
      
      - name: Run daily post script
        env:
          # Resend API configuration
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python bluesky_daily_post.py
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily post job failed!"
          echo "Check the logs above for details."
