name: Daily Bluesky Post Email

# This workflow uses the public Bluesky API (no authentication required)
# Uses bluesky_daily_post.py to fetch posts and send emails

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC (6 AM Brazil time)
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  send-daily-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Debug - List files and locate script
        id: locate
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Directory structure:"
          ls -la
          echo ""
          echo "Finding bluesky_daily_post.py:"
          SCRIPT_PATH=$(find . -name "bluesky_daily_post.py" -type f | head -n 1)
          if [ -n "$SCRIPT_PATH" ]; then
            echo "Found script at: $SCRIPT_PATH"
            echo "script_path=$SCRIPT_PATH" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Script not found!"
            exit 1
          fi
      
      - name: Run daily post script
        env:
          # Resend API configuration
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python ${{ steps.locate.outputs.script_path }}
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily post job failed!"
          echo "Check the logs above for details."
