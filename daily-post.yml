name: Daily Bluesky Post Email

# This workflow uses the public Bluesky API (no authentication required)
# Uses bluesky_daily_post.py to fetch posts and send emails

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC (6 AM Brazil time)
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  send-daily-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily post script
        env:
          # Email secrets
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          
          # Or Infisical
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_ENVIRONMENT: ${{ secrets.INFISICAL_ENVIRONMENT }}
        run: |
          python bluesky_daily_post.py
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Daily post job failed!"
          echo "Check the logs above for details."
